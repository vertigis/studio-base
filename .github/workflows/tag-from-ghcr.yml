name: Tag from GHCR image

on:
  workflow_dispatch:
  push:
    branches:
      - master
  registry_package:
    types:
      - published
      - updated

permissions:
  contents: write
  packages: read

env:
  PACKAGE_OWNER: vertigis
  PACKAGE_NAME: studio/base

concurrency:
  group: tag-from-ghcr
  cancel-in-progress: false

jobs:
  resolve-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.resolve.outputs.tags }}
      primary_tag: ${{ steps.resolve.outputs.primary_tag }}
      commitish: ${{ steps.commitish.outputs.commitish }}
      idempotency_key: ${{ steps.idempotency.outputs.key }}
      cache_hit: ${{ steps.idempotency-cache.outputs.cache-hit }}

    steps:
      - name: Install skopeo
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq skopeo

      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve image tags
        id: resolve
        run: |
          set -euo pipefail
          image_repository="ghcr.io/${PACKAGE_OWNER}/${PACKAGE_NAME}"

          mapfile -t tags < <(
            skopeo list-tags "docker://${image_repository}" |
              jq -r '.Tags[]' |
              grep '^v' |
              sort -V |
              tail -n 5 |
              tac
          )

          if [ "${#tags[@]}" -eq 0 ]; then
            echo "No version tags were found in ghcr.io/vertigis/studio/base."
            exit 1
          fi

          printf 'Resolved tags:\n%s\n' "${tags[@]}"

          tags_json="$(printf '%s\n' "${tags[@]}" | jq -R . | jq -cs .)"
          echo "tags=$tags_json" >> "$GITHUB_OUTPUT"
          echo "primary_tag=${tags[0]}" >> "$GITHUB_OUTPUT"

      - name: Fetch package versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          github_package_name="${PACKAGE_NAME//\//%2F}"

          if ! curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${PACKAGE_OWNER}/packages/container/${github_package_name}/versions?per_page=100" \
            -o versions.json; then
            printf '[]\n' > versions.json
          fi

      - name: Upload package versions artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-versions
          path: versions.json
          if-no-files-found: error

      - name: Resolve commitish
        id: commitish
        run: |
          set -euo pipefail
          echo "commitish=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build idempotency key
        id: idempotency
        env:
          PRIMARY_TAG: ${{ steps.resolve.outputs.primary_tag }}
          COMMITISH: ${{ steps.commitish.outputs.commitish }}
        run: |
          set -euo pipefail
          echo "key=${PRIMARY_TAG}|${COMMITISH}" >> "$GITHUB_OUTPUT"

      - name: Prepare idempotency marker path
        run: |
          set -euo pipefail
          mkdir -p .github/.cache/tag-from-ghcr

      - name: Restore idempotency marker
        id: idempotency-cache
        uses: actions/cache/restore@v4
        with:
          path: .github/.cache/tag-from-ghcr
          key: ${{ steps.idempotency.outputs.key }}

  tag-image:
    if: needs.resolve-tags.outputs.cache_hit != 'true'
    needs: resolve-tags
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image_tag: ${{ fromJson(needs.resolve-tags.outputs.tags) }}

    steps:

      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download package versions artifact
        uses: actions/download-artifact@v4
        with:
          name: package-versions
          path: .

      - name: Fetch image metadata from GHCR
        id: manifest
        env:
          IMAGE_TAG: ${{ matrix.image_tag }}
          RESOLVED_TAGS_JSON: ${{ needs.resolve-tags.outputs.tags }}
        run: |
          set -euo pipefail
          image_ref="ghcr.io/${PACKAGE_OWNER}/${PACKAGE_NAME}:${IMAGE_TAG}"

          docker buildx imagetools inspect "$image_ref" --raw > manifest.json
          docker buildx imagetools inspect "$image_ref" --format '{{json .Manifest}}' > manifest-details.json
          printf '%s\n' "$RESOLVED_TAGS_JSON" > top-tags.json

          digest="$(python -c "import json,sys; print(json.load(sys.stdin)['digest'])" < manifest-details.json)"

          if [ -z "$digest" ]; then
            echo "Failed to read the manifest digest for $IMAGE_TAG."
            exit 1
          fi

          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Generate markdown snapshot
        env:
          IMAGE_TAG: ${{ matrix.image_tag }}
        run: |
          set -euo pipefail
          python .github/scripts/build_snapshot.py \
            --current-tag "$IMAGE_TAG" \
            --top-tags-json top-tags.json \
            --manifest-json manifest.json \
            --versions-json versions.json \
            --output docs/index.md
      - name: Pin README examples to image tag
        env:
          IMAGE_TAG: ${{ matrix.image_tag }}
        run: |
          set -euo pipefail
          python -c "from pathlib import Path; path = Path('README.md'); content = path.read_text(encoding='utf-8'); content = content.replace('https://vertigis.github.io/studio-base/', 'https://vertigis.github.io/studio-base/?tag=${IMAGE_TAG}'); content = content.replace('<tag>', '${IMAGE_TAG}'); path.write_text(content, encoding='utf-8')"
      - name: Create git tag
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          IMAGE_TAG: ${{ matrix.image_tag }}
          MANIFEST_DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --detach "origin/${DEFAULT_BRANCH}"
          git add README.md _navbar.md
          git add -f docs/index.md
          git commit -m "Capture Studio Base snapshot for ${IMAGE_TAG}"

          git tag -fa "$IMAGE_TAG" -m "Mirror ghcr.io/${PACKAGE_OWNER}/${PACKAGE_NAME}:${IMAGE_TAG}

          Manifest digest: ${MANIFEST_DIGEST}"
          git push --force origin "refs/tags/${IMAGE_TAG}"

  deploy-pages:
    if: needs.resolve-tags.outputs.cache_hit != 'true'
    needs:
      - resolve-tags
      - tag-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Publish latest resolved tag to gh-pages
        env:
          PRIMARY_TAG: ${{ needs.resolve-tags.outputs.primary_tag }}
        run: |
          set -euo pipefail

          git fetch --tags --force origin
          git checkout --detach "refs/tags/${PRIMARY_TAG}"
          git push --force origin "HEAD:refs/heads/gh-pages"

      - name: Prepare Pages artifact
        run: |
          set -euo pipefail

          rm -rf site
          mkdir -p site/docs
          cp index.html site/index.html
          cp _navbar.md site/_navbar.md
          cp README.md site/README.md
          cp docs/index.md site/docs/index.md
          touch site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  save-idempotency-state:
    if: needs.resolve-tags.outputs.cache_hit != 'true'
    needs:
      - resolve-tags
      - tag-image
      - deploy-pages
    runs-on: ubuntu-latest

    steps:
      - name: Create idempotency marker
        env:
          PRIMARY_TAG: ${{ needs.resolve-tags.outputs.primary_tag }}
          COMMITISH: ${{ needs.resolve-tags.outputs.commitish }}
        run: |
          set -euo pipefail
          mkdir -p .github/.cache/tag-from-ghcr
          printf '{"primary_tag":"%s","commitish":"%s"}\n' "$PRIMARY_TAG" "$COMMITISH" > .github/.cache/tag-from-ghcr/state.json

      - name: Save idempotency marker
        uses: actions/cache/save@v4
        with:
          path: .github/.cache/tag-from-ghcr
          key: ${{ needs.resolve-tags.outputs.idempotency_key }}
